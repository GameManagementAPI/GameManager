# Global
"prefix-followup": "<gray>[</gray><white>+</white><gray>]</gray>"
"sorry": "${prefix} <red>Entschuldigung!</red>"
"general-failure": "${sorry} Aber etwas ist schiefgelaufen!"
"not-connected": "${sorry} Aber dieser Spieler ist nicht mit dem Server verbunden!"
"not-in-game": "${sorry} Aber dieser Spieler ist in keinem Spiel!"

# /gamemanagementapi command
command.api:
  "desc": "Dieser Befehl erlaubt es Server-Admins aus dem Spiel direkt auf die GameManagementAPI zuzugreifen."

  games:
    # ... list
    "list.failure.empty": "${sorry} Aber aktuell sind keine Spiele registriert."
    "list.msg.title": "${prefix} Aktuell registrierte Spiele: <gray>($0)</gray>:"
    "list.msg.entry": "<grey>-</grey> <click:copy_to_clipboard:$0><hover:show_text:'Klicke um die Spiel-Id zu kopieren'>$0</hover></click> <gray>($1)</gray>"

    # ... register
    "register.failure.invalid_size": "${sorry} Aber es ist kein Spiel dieser Größe möglich."
    "register.failure.invalid_format": "${prefix} <red>Unerlaubte Spielgröße: \"$0\"</red>"
    "register.success": "${prefix} <green>Neues Spiel wurde erfolgreich erstellt: </green><white><click:copy_to_clipboard:$0><hover:show_text:'Klicke um die Spiel-Id zu kopieren'>$0</hover></click></white>"

    # ... start
    "start.failure.invalid_id": "${sorry} Aber dieses Spiel scheint nicht zu existieren oder läuft bereits!"
    "start.success": "${prefix} <green>Das Spiel </green><white>'$0'</white> <gray>($1)</gray> wurde erfolgreich gestartet!"

    # ... stop
    "stop.failure.invalid_id": "${sorry} Aber dieses Spiel scheint nicht zu existieren oder wurde bereits gestoppt!"
    "stop.success": "${prefix} <green>Das Spiel </green><white>'$0'</white><green> wurde erfolgreich gestoppt.</green>"

    # ... info
    "info.failure.invalid_id": "${sorry} Aber dieses Spiel scheint nicht zu existieren!"
    "info.l1": "${prefix} <white>Informationen über das Spiel</white> <grey>'$0'</grey><white>:</white>"
    "info.l2": "${prefix-followup} <grey>Spiel ID:</grey> <white><click:copy_to_clipboard:$0><hover:show_text:'Klicke um die Spiel-Id zu kopieren'>$0</hover></click></white>"
    "info.l3": "${prefix-followup} <grey>Status:</grey> $0"
    "info.l4": "${prefix-followup} <grey>Größe:</grey> <white>$0</white>"
    "info.l5": "${prefix-followup} <white>$0</white>/<white>$1</white> Players"
    "info.l6": "${prefix-followup} <white>Map:</white> $0"
    "info.l7": "${prefix-followup} <white>Privat:</white> $0 ($1)"

    # ... list-players
    "list-players.failure.invalid_id": "${sorry} Aber dieses Spiel scheint nicht zu existieren!"
    "list-players.failure.empty": "${sorry} Aber es scheint als seien keine Spieler zu diesem Spiel verbunden!"
    "list-players.msg.title": "${prefix} <grey>Spieler von</grey> <white><click:copy_to_clipboard:$0><hover:show_text:'Klicke um die Spiel-Id zu kopieren'>'$0'</hover></click></white><grey>:</grey>"
    "list-players.msg.entry": "- <click:copy_to_clipboard:$0><hover:show_text:'Klicke um den namen zu kopieren'>$0</hover></click> (<white>Team:</white> <gray>$1</gray>)"

    # ... join
    "join.failure.invalid_id": "${sorry} Aber dieses Spiel existiert entweder nicht, oder wurde bereits gestartet!"
    "join.failure.in_game": "${sorry} Aber du bist bereits mit einem anderen Spiel verbunden!"
    "join.failure.general": "${general-failure}"
    "join.success": "${prefix} <green>Erfolgreich mit dem Spiel </green><white>'$0'</white><green> verbunden.</green>"

  player:
    # ... game
    "game.failure.invalid_player": "${not-connected}"
    "game.failure.no_game": "${not-in-game}"
    "game.msg": "${prefix} <gray>$0</gray> Spielt aktuell in <gray><click:copy_to_clipboard:$1><hover:show_text:'Klicke um die Spiel-Id zu kopieren'>'$1'</hover></click></gray>"

    # ... quit
    "quit.failure.invalid_player": "${not-connected}"
    "quit.failure.no_game": "${not-in-game}"
    "quit.failure.general": "${general-failure}"
    "quit.success": "${prefix} <white>'$0'</white><green> wurde erfolgreich von dem Spiel </green><white><click:copy_to_clipboard:$1><hover:show_text:'Klicke um die Spiel-Id zu kopieren'>'$1'</hover></click></white> <green>getrennt!</green>"

    # ... send
    "send.failure.invalid_id": "${sorry} Aber dieses Spiel existiert entweder nicht, oder wurde bereits gestartet!"
    "send.failure.invalid_player": "${not-connected}"
    "send.failure.same_game": "${sorry} Aber dieser Spieler ist bereits in einem Spiel!"
    "send.failure.general": "${general-failure}"
    "send.success": "${prefix} <green></green><white>'$0'</white><green> wurde erfolgreich mit dem Spiel </green><white><click:copy_to_clipboard:$1><hover:show_text:'Klicke um die Spiel-Id zu kopieren'>'$1'</hover></click></white> <green>verbunden!</green>"
    
    # ... jump
    "jump.failure.invalid_player": "${not-connected}"
    "jump.failure.no_game": "${not-in-game}"
    "jump.failure.same_game": "${sorry} Aber du bist bereits mit dem selben Spiel verbunden wie <gray>$0</gray>!"
    "jump.failure.self": "${sorry} Aber du kannst dir selbst nicht nachspringen!"
    "jump.failure.general": "${general-failure}"
    "jump.success": "${prefix} <green>Du wurdest mit </green><white>$0s</white><green> Spiel erfolgreich verbunden.</green> (<white>Spiel: </white><gray><click:copy_to_clipboard:$1><hover:show_text:'Klicke um die Spiel-Id zu kopieren'>$1</hover></click></gray>)"

    # ... eliminate
    "eliminate.failure.invalid_player": "${not-connected}"
    "eliminate.failure.no_game": "${not-in-game}"
    "eliminate.failure.already": "${sorry} Aber dieser Spieler ist bereits eliminiert!"
    "eliminate.success": "${prefix} <white>$0</white><green> wurde erfolgreich eliminiert.</green> (<white>Spiel: </white><gray><click:copy_to_clipboard:$1><hover:show_text:'Klicke um die Spiel-Id zu kopieren'>$1</hover></click></gray>)"

    # ... revive
    "revive.failure.invalid_player": "${not-connected}"
    "revive.failure.no_game": "${not-in-game}"
    "revive.failure.already": "${sorry} Aber dieser Spieler wurde noch nicht eliminiert!"
    "revive.success": "${prefix} <white>$0</white><green> wurde erfolgreich wiederbelebt.</green> (<white>Spiel: </white><gray><click:copy_to_clipboard:$1><hover:show_text:'Klicke um die Spiel-Id zu kopieren'>$1</hover></click></gray>)"

    # ... team
    team:
      "get.failure.invalid_player": "${not-connected}"
      "get.failure.no_game": "${not-in-game}"
      "get.failure.no_team": "${sorry} Aber dieser Spieler ist in keinem Team!"
      "get.msg": "${prefix} <gray>$0</gray> ist aktuell Mitglied des Teams <gray>#<click:copy_to_clipboard:t$1><hover:show_text:'Klicke um die Team-Id zu kopieren'>$1</hover></click></gray> ($2)"

      # team join
      "join.failure.invalid_player": "${not-connected}"
      "join.failure.no_game": "${sorry} Aber du kannst diesen Befehl nicht ausführen während du in einem Spiel bist!"
      "join.failure.invalid_team": "${sorry} Aber dieses Team existiert nicht: <gray>'$0'</gray>!"
      "join.failure.already_running": "${sorry} Aber du kannst dies nicht machen während das Spiel bereits läuft!"
      "join.failure.general": "${general-failure}"
      "join.success": "${prefix} <green>Spieler wurde erfolgreich mit dem team</green> <white>$0</white> <green>verbunden!</green>"

      # team quit
      "quit.failure.no_game": "${sorry} Aber du kannst diesen Befehl nicht ausführen während du in einem Spiel bist!"
      "quit.failure.invalid_team": "${sorry} Aber dieser Spieler ist in keinem Team!"
      "quit.failure.already_running": "${sorry} Aber du kannst dies nicht machen während das Spiel bereits läuft!"
      "quit.failure.general": "${general-failure}"
      "quit.success": "${prefix} <green>Spieler wurde erfolgreich von tem dem Team</green> <white>$0</white> <green>entfernt!</green>"

# /join command
command.join:
  desc: "Verbinde dich mit einem Spiel bestimmter Größe."

  "failure.invalid_size": "${sorry} Aber diese Spielgröße ist nicht verfügbar."
  "failure.invalid_format": "${prefix} <red>Nicht unterstützte team größe: \"$0\"</red>"
  "failure.already": "${sorry} Aber du bist bereits in einem Spiel!"
  "failure.general": "${general-failure}"
  "success": "${prefix} <green>Du bist erfolgreich einem Spiel beigetreten!</green>"

# /quit command
command.quit:
  desc: "Verlasse das aktuelle Spiel"

  "failure.no_game": "${sorry} Aber du bist mit keinem Spiel verbunden!"
  "success": "${prefix} <green>Du wurdest erfolgreich von dem Spiel getrennt!</green>"

# /start command
command.start:
  desc: "Erlaubt es dir ein Spiel frühzeitig zu starten wenn genügend Spieler verbunden sind!"

  "failure.no_game": "${sorry} Aber du musst mit einem Spiel verbunden sein um diesen Befehl auszuführen!"
  "failure.already": "${sorry} Aber dieses Spiel läuft bereits!"
  "failure.not_enough": "${sorry} Aber es müssen mindestens <gray>$0</gray> Spieler in diesem Spiel sein, um es zu starten!"
  "failure.general": "${general-failure}"
  "success": "${prefix} <green>Starte Spiel...</green>"

# /forcemap command
command.forcemap:
  desc: "Erlaubt es dir, die Map eines Spiels festzulegen"

  "failure.no_game": "${sorry} Aber du musst mit einem Spiel verbunden sein, um diesen Befehl auszuführen!"
  "failure.already_running": "${sorry} Aber dieses Spiel läuft bereits!"
  "failure.already": "${sorry} Die Map für dieses Spiel wurde bereits festgelegt (<gray>'$0'</gray>)!"
  "failure.invalid_map": "${sorry} Aber diese Map existiert nicht!"
  "success": "${prefix} <green>Die Map wurde erfolgreich zu </green><gray>'$0'</gray> <green>gesetzt!</green>"

# /language command
command.language:
  desc: "Erlaubt es Spielern, ihre Sprach-Präferenz festzulegen"

  "failure.invalid_language": "${sorry} Aber diese Sprache wird nicht unterstützt!"
  "success": "${prefix} <green>Deine Sprach-Präferenz wurde erfolgreich zu <gray>'$0'</gray> geändert.</green>"

# /spectate command
command.spectate:
  desc: "Erlaubt es Spielern ein Spiel zu beobachten"

  "player.failure.invalid_player": "${not-connected}"
  "player.failure.self": "${sorry} Aber du kannst dich nicht selbst beobachten!"
  "player.failure.no_game": "${not-in-game}"
  "player.failure.not_running": "${sorry} Aber dieses Spiel läuft noch nicht!"
  "player.failure.playing": "${sorry} Aber du kannst diesen Befehl nicht während einem Spiel ausführen!"
  "player.success": "${prefix} Du schaust nun <gray>$0</gray> zu."

  "game.failure.invalid_id": "${sorry} Aber dieses Spiel scheint nicht zu existieren!"
  "game.failure.self": "${sorry} Aber du kannst dir nicht selbst zuschauen!"
  "game.failure.not_running": "${sorry} Aber dieses Spiel läuft nicht!"
  "game.failure.playing": "${sorry} Aber du kannst diesen Befehl nicht währen einem Spiel ausführen!"
  "game.success": "${prefix} Betrete <gray>$0</gray> im Zuschauermodus..."

# /map command
command.map:
  desc: "Zeigt die aktuelle Spiel-Map an"

  "failure.no_game": "${sorry} Aber du bist mit keinem Spiel verbunden!"
  "failure.not_running": "${sorry} Aber das aktuelle Spiel läuft noch nicht. Die Map ist noch nicht entschieden!"
  "failure.no_map": "${sorry} Die Map wurde noch nicht geladen!"
  "msg.l1": "${prefix} Map Informationen:"
  "msg.l2": "${prefix-followup} <gray>Name:</gray> $0"
  "msg.l3": "${prefix-followup} <gray>Erbauer:</gray> $0"

# /privategame command
command.privategame:
  desc: "Erstelle diene eigenen privaten Spiele"

  "create.failure.invalid_size": "${sorry} Aber ein Spiel dieser Größe ist nicht möglich!"
  "create.failure.invalid_format": "${prefix} <red>Nicht unterstützte Spielgröße: \"$0\"</red>"
  "create.failure.already": "${sorry} Aber du bist bereits in einem Spiel!"
  "create.failure.general": "${general-failure}"
  "create.success": "${prefix} <green>Privates Spiel wurde erfolgreich erstellt!</green>"

  "invite.failure.invalid_player": "${not-connected}"
  "invite.failure.no_game": "${sorry} Aber du hostest aktuell kein privates Spiel!"
  "invite.failure.player_in_game": "${sorry} Aber dieser Spieler ist bereits mit einem anderen Spiel verbunden!"
  "invite.failure.already": "${sorry} Du hast diesen Spieler bereits eingeladen!"
  "invite.success": "${prefix} <green><white>$0</white> wurde eingeladen!</green>"
  "invite.msg.l1": "${prefix} Einladung zu privatem Spiel:"
  "invite.msg.l2": "${prefix-followup} <gray>$0</gray> hat dich zu einem privaten Spiel eingeladen!"
  "invite.msg.l3": "${prefix-followup} <b><green><click:run_command:'/privategame join $0'>Klicke hier um beizutreten</click></green></b>"


  "join.failure.invalid_player": "${not-connected}"
  "join.failure.no_invite": "${sorry} Aber <gray>$0</gray> hat dich zu keinem Spiel eingeladen!"
  "join.failure.already": "${sorry} Aber du bist bereits in einem Spiel!"
  "join.failure.already_joined": "${sorry} Aber du bist bereits in diesem Spiel!"
  "join.failure.general": "${general-failure}"
  "join.success": "${prefix} <green>Du hast <white>$0</white>s privates Spiel erfolgreich betreten!</green>"

# Queue
"queue.countdown.title": "Spiel startet in $0 sekunden"
"queue.countdown.cancelled": "<red>Der Start wurde abgebrochen!</red>"

# Chat
chat:
  "message.no-game": "<gray>$0:</gray> $2"
  "message.spectator": "<gray>[Zuschauer] $0:</gray> $2"
  "message.queue": "<gray>[Warteschlange] $0:</gray> $2"
  "message.public": "<gray>[@all:</gray>$1<gray>] $0:</gray> $2"
  "message.team": "<gray>[@team] $0:</gray> $2"

# Game end
"end.countdown": "${prefix} <gray>Der Server wird in <b><white>$0</white></b> sekunden stoppen!</gray>"
"end.kick.message": "Map lädt neu."

"team.label.default.format": "<gold>#$0</gold>"